services:
  frontend:
    build:
      context: ./frontend
    container_name: frontend
    ports:
      - "5173:80"
    depends_on:
      - api-gateway
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
    container_name: api-gateway
    ports:
      - "8080:8080"
    environment:
      PORT: 8080
      FRONTEND_URL: http://localhost:5173
      AUTH_SERVICE_URL: http://auth-service:3001
      CATALOG_SERVICE_URL: http://catalog-service:3002
      TRIP_SERVICE_URL: http://trip-service:3003
      ANALYTICS_SERVICE_URL: http://analytics-service:3004
    depends_on:
      - auth-service
      - catalog-service
      - trip-service
      - analytics-service
    restart: unless-stopped

  auth-service:
    build:
      context: ./auth-service
    container_name: auth-service
    ports:
      - "3001:3001"
    environment:
      PORT: 3001
      FRONTEND_URL: http://localhost:5173
      DB_HOST: mysql-auth
      DB_PORT: 3306
      DB_NAME: auth_db
      DB_USER: auth_user
      DB_PASSWORD: auth_password
      JWT_SECRET: change_me_auth_secret
      JWT_EXPIRES_IN: 1h
    depends_on:
      mysql-auth:
        condition: service_healthy
    restart: unless-stopped

  mysql-auth:
    image: mysql:8.0
    container_name: mysql-auth
    ports:
      - "3307:3306"
    environment:
      MYSQL_DATABASE: auth_db
      MYSQL_USER: auth_user
      MYSQL_PASSWORD: auth_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - mysql-auth-data:/var/lib/mysql
      - ./auth-service/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  catalog-service:
    build:
      context: ./catalog-service
    container_name: catalog-service
    ports:
      - "3002:3002"
    environment:
      PORT: 3002
      MONGO_URI: mongodb://mongo-catalog:27017/catalog_db
      GEOAPIFY_API_KEY: change_me
      NOMINATIM_BASE_URL: https://nominatim.openstreetmap.org
    depends_on:
      - mongo-catalog
    restart: unless-stopped

  mongo-catalog:
    image: mongo:7
    container_name: mongo-catalog
    ports:
      - "27017:27017"
    volumes:
      - mongo-catalog-data:/data/db
    restart: unless-stopped

  trip-service:
    build:
      context: ./trip-service
    container_name: trip-service
    ports:
      - "3003:3003"
    environment:
      PORT: 3003
      DB_HOST: trip-db
      DB_PORT: 3306
      DB_NAME: trip_db
      DB_USER: trip_user
      DB_PASSWORD: trip_password
      JWT_SECRET: change_me_auth_secret
      KAFKA_BROKERS: kafka:19092
      WEATHER_API_URL: https://api.openweathermap.org
      WEATHER_API_KEY: change_me
    depends_on:
      trip-db:
        condition: service_healthy
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  trip-db:
    image: mysql:8.0
    container_name: trip-db
    ports:
      - "3308:3306"
    environment:
      MYSQL_DATABASE: trip_db
      MYSQL_USER: trip_user
      MYSQL_PASSWORD: trip_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - trip-db-data:/var/lib/mysql
      - ./trip-service/database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -uroot -proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  analytics-service:
    build:
      context: ./analytics-service
    container_name: analytics-service
    ports:
      - "3004:3004"
    environment:
      PORT: 3004
      MONGO_URI: mongodb://mongo-analytics:27017/analytics_db
      KAFKA_BROKER: kafka:19092
      KAFKA_GROUP_ID: analytics-service-group
    depends_on:
      mongo-analytics:
        condition: service_started
      kafka:
        condition: service_healthy
      kafka-init:
        condition: service_completed_successfully
    restart: unless-stopped

  mongo-analytics:
    image: mongo:7
    container_name: mongo-analytics
    ports:
      - "27018:27017"
    volumes:
      - mongo-analytics-data:/data/db
    restart: unless-stopped

  kafka:
    image: apache/kafka:4.3.0
    container_name: kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: "broker,controller"

      KAFKA_LISTENERS: "PLAINTEXT://:19092,CONTROLLER://:19093,PLAINTEXT_HOST://:9092"
      KAFKA_ADVERTISED_LISTENERS: "PLAINTEXT://kafka:19092,PLAINTEXT_HOST://localhost:9092"

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT"
      KAFKA_CONTROLLER_LISTENER_NAMES: "CONTROLLER"
      KAFKA_INTER_BROKER_LISTENER_NAME: "PLAINTEXT"
      KAFKA_CONTROLLER_QUORUM_VOTERS: "1@kafka:19093"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 1
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "/opt/kafka/bin/kafka-topics.sh --bootstrap-server localhost:19092 --list > /dev/null 2>&1"
        ]
      interval: 10s
      timeout: 10s
      retries: 12
      start_period: 20s
    restart: unless-stopped

  kafka-init:
    image: apache/kafka:4.3.0
    container_name: kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        set -e

        echo "Kreiranje Kafka topic-a..."

        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic trip-created --partitions 1 --replication-factor 1

        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic trip-updated --partitions 1 --replication-factor 1

        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic analytics-generated --partitions 1 --replication-factor 1

        /opt/kafka/bin/kafka-topics.sh --bootstrap-server kafka:19092 --create --if-not-exists --topic trip-processing-failed --partitions 1 --replication-factor 1

        echo "Svi Kafka topic-i su uspesno kreirani."
    restart: "no"

volumes:
  mysql-auth-data:
  trip-db-data:
  mongo-catalog-data:
  mongo-analytics-data: